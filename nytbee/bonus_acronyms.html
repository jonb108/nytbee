<html>
<head>
<title>Headings Explained</title>
<style>
body {
    margin: .3in;
}
body, th, td {
    font-family: Arial;
    font-size: 15pt;
}
th {
    text-align: left;
    font-weight: bold;
}
</style>
</head>
<body>
<h3>Headings Explained</h3>
<table cellpadding=5>
<tr><th>#</th><td># of Bonus/Donut words</td></tr>
<tr><th>ow</th><td># of Own Bonus/Donut words</td></tr>
<tr><th>boa</th><td># of the 19 additional letters used in a Bonus word</td></tr>
<tr><th>bb</th><td># of letters A-Z that begin a Bonus word</td></tr>
<tr><th>Xw</th><td># of Bonus words beginning with X</td></tr>
<tr><th>oXw</th><td># of Own Bonus words beginning with X</td></tr>
</table>
</body>
</html>
